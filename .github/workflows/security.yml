name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan to catch new CVEs in dependencies
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  grype:
    name: Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Grype filesystem scan
        uses: anchore/scan-action@v7
        id: grype
        with:
          path: "."
          severity-cutoff: "high"
          only-fixed: "true"
          output-format: "sarif"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
